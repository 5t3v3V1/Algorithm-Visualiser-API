<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Algorithm Visualiser</title>
</head>
<body>
    <h1>Algorithm Visualiser</h1>
    <p></p>
    <p>Options</p>
    <button id="generate_solve_board">Generate & Solve Board</button>
    <button id="generate_solve_grid">Generate & Solve Grid</button>
    <p></p>
    <p>Generated Board:</p>
    <div id="generated_board"></div>
    <p></p>
    <p>Solved Board:</p>
    <div id="solved_board"></div>
    <p></p>
    <p>Generated Grid:</p>
    <div id="generated_grid"></div>
    <p></p>
    <div id="bfs_type"></div>
    <div id="bfs_nodes"></div>
    <div id="bfs_grid"></div>
    <div id="bfs_steps"></div>
    <p></p>
    <div id="dfs_type"></div>
    <div id="dfs_nodes"></div>
    <div id="dfs_grid"></div>
    <div id="dfs_steps"></div>
    <p></p>
    <div id="dijkstra_type"></div>
    <div id="dijkstra_nodes"></div>
    <div id="dijkstra_grid"></div>
    <div id="dijkstra_steps"></div>
    <p></p>
    <div id="astar_type"></div>
    <div id="astar_nodes"></div>
    <div id="astar_grid"></div>
    <div id="astar_steps"></div>
    

    <script src="script.js"></script>
    
</body>
</html>
